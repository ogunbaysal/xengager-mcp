services:
  mcp:
    build: .
    container_name: mcp-bun-starter
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 6660
      NODE_ENV: development
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    ports:
      - "6660:6660"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: mcp-bun-ngrok
    restart: unless-stopped
    depends_on:
      - mcp
    env_file:
      - .env
    command: http mcp:6660
    ports:
      - "4040:4040"
